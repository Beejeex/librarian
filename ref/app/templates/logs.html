{% extends "base.html" %}
{% block title %} — Logs{% endblock %}

{% block content %}
<h1>Logs</h1>

<div
    class="card"
    x-data="logStream()"
    x-init="init()"
    @unload.window="destroy()">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:.75rem">
            <span
                x-text="connected ? 'Live' : 'Disconnected'"
                :style="connected
                    ? 'background:#16a34a;color:#fff;padding:.15em .55em;border-radius:999px;font-size:.75rem;font-weight:600'
                    : 'background:#dc2626;color:#fff;padding:.15em .55em;border-radius:999px;font-size:.75rem;font-weight:600'"
            ></span>
            <label style="display:flex;align-items:center;gap:.35rem;font-size:.85rem;cursor:pointer">
                <input type="checkbox" x-model="autoScroll" style="accent-color:#0284c7" />
                Auto-scroll
            </label>
        </div>
        <button class="btn btn-danger btn-sm"
                @click="clearLogs()"
                x-text="clearing ? 'Cleared' : 'Clear logs'"></button>
    </div>

    <pre id="log-output"
         style="background:#0f172a;padding:1rem;border-radius:.375rem;font-size:.78rem;
                color:#a3e635;overflow-x:auto;overflow-y:auto;max-height:65vh;
                min-height:200px;white-space:pre-wrap;">
        <span x-show="lines.length === 0" style="color:#64748b">Waiting for log output…</span>
        <template x-for="line in lines" :key="line">
            <div x-text="line"></div>
        </template>
    </pre>
</div>

<script>
function logStream() {
    return {
        lines: [],
        connected: false,
        autoScroll: true,
        clearing: false,
        _source: null,
        _reconnectTimer: null,

        init() {
            this.connect();
        },

        connect() {
            if (this._source) this._source.close();
            this._source = new EventSource('/api/logs/stream');

            this._source.onopen = () => { this.connected = true; };

            this._source.onmessage = (e) => {
                if (e.data) {
                    this.lines.push(e.data);
                    // Cap displayed lines to 500 to avoid DOM bloat
                    if (this.lines.length > 500) this.lines.shift();
                }
                if (this.autoScroll) this.$nextTick(() => this.scrollToBottom());
            };

            this._source.onerror = () => {
                this.connected = false;
                this._source.close();
                // Reconnect after 3 seconds
                this._reconnectTimer = setTimeout(() => this.connect(), 3000);
            };
        },

        scrollToBottom() {
            const el = document.getElementById('log-output');
            if (el) el.scrollTop = el.scrollHeight;
        },

        async clearLogs() {
            await fetch('/api/logs/clear', { method: 'POST' });
            this.lines = [];
            this.clearing = true;
            setTimeout(() => { this.clearing = false; }, 2000);
        },

        destroy() {
            if (this._source) this._source.close();
            if (this._reconnectTimer) clearTimeout(this._reconnectTimer);
        },
    };
}
</script>
{% endblock %}
